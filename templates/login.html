<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>כניסה | מנתח בדיקות דם</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fff1f2 0%, #fff7ed 100%);
    }
    .login-card {
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(220,38,38,0.08);
    }
    .login-logo {
      margin-bottom: 20px;
    }
    .login-logo svg {
      width: 64px;
      height: 64px;
    }
    .login-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: 8px;
    }
    .login-subtitle {
      color: var(--gray-500);
      font-size: 0.95rem;
      margin-bottom: 36px;
      line-height: 1.5;
    }
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 13px 20px;
      border: 1.5px solid var(--gray-200);
      border-radius: 12px;
      background: #fff;
      color: var(--gray-800);
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
    }
    .btn-google:hover {
      border-color: var(--red);
      box-shadow: 0 2px 12px rgba(220,38,38,0.1);
      background: #fff8f8;
    }
    .btn-google svg {
      flex-shrink: 0;
    }
    .login-footer {
      margin-top: 28px;
      font-size: 0.8rem;
      color: var(--gray-400);
    }
  </style>
</head>
<body class="rtl">
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="30" fill="#dc2626" opacity="0.12"/>
        <path d="M32 8C32 8 20 22 20 34a12 12 0 0024 0c0-12-12-26-12-26z" fill="#dc2626"/>
        <circle cx="28" cy="34" r="3" fill="white" opacity="0.7"/>
      </svg>
    </div>
    <h1 class="login-title">מנתח בדיקות דם</h1>
    <p class="login-subtitle">ניתוח לפי רפואה מערבית ורפואה סינית<br>למטפלים בריאות</p>

    <a href="/auth/login" class="btn-google">
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      התחבר עם Google
    </a>

    <p class="login-footer">הנתונים שלך פרטיים ומאובטחים</p>
  </div>
</body>
</html>
